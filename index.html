<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stretch &amp; Move">
  <meta name="theme-color" content="#fff8d9">
  <title>Stretch & Move! by Lake Wren</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff8d9;
      min-height: 100vh;
      <link rel="apple-touch-icon" href="https://rebecca-hq.netlify.app/stretch-icon-180.png">
      <link rel="icon" type="image/png" sizes="192x192" href="https://rebecca-hq.netlify.app/stretch-icon-192.png">
      max-width: 430px;
      margin: 0 auto;
    }
    .screen { display: none; padding: 16px 16px 32px; }
    .screen.active { display: block; }

    /* Home */
    .home-header { text-align: center; padding: 22px 0 22px; }
    .home-header .logo-wrap { width: 96px; height: 96px; margin: 0 auto 8px; filter: drop-shadow(0 6px 14px rgba(155,133,214,0.25)); }
    .home-header .logo-svg { width: 100%; height: 100%; display: block; }
    .home-header h1 { font-size: 32px; font-weight: 800; color: #4a3580; letter-spacing: -0.02em; margin-top: 4px; }
    .home-header .byline { font-size: 14px; font-weight: 700; color: #d6a73e; margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
    .home-header .tagline { font-size: 14px; color: #8a7a55; margin-top: 8px; }

    .intro-card {
      background: linear-gradient(135deg, #ede4ff 0%, #ddd0ff 100%);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
    }
    .intro-card:active { transform: scale(0.97); opacity: 0.85; }
    .intro-icon {
      font-size: 28px;
      width: 52px; height: 52px;
      background: #fff8d9;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(155,133,214,0.2);
    }
    .intro-label { font-size: 17px; font-weight: 700; color: #4a3580; }
    .intro-sub { font-size: 13px; color: #7c63b8; margin-top: 3px; }

    .sport-card {
      background: linear-gradient(135deg, #fff 0%, #faf6ff 100%);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(155,133,214,0.18);
      border: 2px solid #efe7ff;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .sport-card:active { transform: scale(0.97); box-shadow: 0 0 0 rgba(0,0,0,0); }
    .sport-icon {
      font-size: 36px;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #fff5b3 0%, #ffe78a 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(214,167,62,0.25);
    }
    .sport-label { font-size: 20px; font-weight: 800; color: #4a3580; }
    .sport-sub { font-size: 13px; color: #9b85d6; margin-top: 3px; font-weight: 500; }
    .sport-arrow { margin-left: auto; font-size: 24px; color: #c8b5f0; font-weight: 700; }

    /* Sport screen */
    .back-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: #9b85d6; padding: 4px 0; font-weight: 600;
      margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .screen-title { font-size: 26px; font-weight: 800; color: #4a3580; margin-bottom: 4px; letter-spacing: -0.02em; }
    .screen-sub { font-size: 14px; color: #9b85d6; margin-bottom: 18px; }

    .stretch-card {
      background: linear-gradient(135deg, #fff 0%, #faf6ff 100%);
      border-radius: 18px;
      border: 1.5px solid #f0e8ff;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: transform 0.12s;
    }
    .stretch-card:active { transform: scale(0.97); }
    .stretch-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .stretch-name { font-size: 16px; font-weight: 700; color: #4a3580; }
    .stretch-dur { font-size: 12px; color: #9b85d6; margin-top: 2px; }
    .play-arrow { margin-left: auto; font-size: 22px; }

    .section-divider {
      font-size: 12px; font-weight: 700; color: #9b85d6;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 18px 0 10px;
    }

    /* Video screen */
    .video-container {
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      aspect-ratio: 9/16;
      width: 100%;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .video-container video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .video-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .video-meta { font-size: 13px; color: #aaa; margin-bottom: 18px; }
    .nav-row { display: flex; gap: 10px; }
    .nav-btn {
      flex: 1; padding: 14px;
      border-radius: 14px;
      border: none;
      background: #fff;
      font-size: 15px; font-weight: 600;
      cursor: pointer; color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.1s;
    }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn.primary { background: #9b85d6; color: #fff; box-shadow: 0 3px 10px rgba(155,133,214,0.35); }
  </style>

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="logo-wrap">
      <svg viewBox="0 0 512 512" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lilacgrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#d8c8f5"/>
            <stop offset="100%" stop-color="#b9a0e8"/>
          </linearGradient>
        </defs>
        <g transform="translate(256 260)">
          <path d="M 0 -200 L 50 -70 L 190 -60 L 78 30 L 118 170 L 0 100 L -118 170 L -78 30 L -190 -60 L -50 -70 Z" fill="url(#lilacgrad)" stroke="#9b85d6" stroke-width="10" stroke-linejoin="round"/>
          <path d="M -40 -90 Q -40 -104 -26 -104 L 36 -104 Q 58 -104 58 -82 Q 58 -58 36 -58 L -20 -58 Q -46 -58 -46 -30 Q -46 0 -20 0 L 36 0 Q 58 0 58 22 Q 58 46 36 46 L -30 46" fill="none" stroke="#ffe35a" stroke-width="26" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M -40 -90 Q -40 -104 -26 -104 L 36 -104 Q 58 -104 58 -82 Q 58 -58 36 -58 L -20 -58 Q -46 -58 -46 -30 Q -46 0 -20 0 L 36 0 Q 58 0 58 22 Q 58 46 36 46 L -30 46" fill="none" stroke="#d6a73e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
        </g>
      </svg>
    </div>
    <h1>Stretch &amp; Move!</h1>
    <p class="byline">by Lake Wren</p>
    <p class="tagline">Pick your sport and let's get stretching</p>
  </div>

  <div class="intro-card" onclick="playVideo('intro.mp4', 'Welcome!', 'Watch this first', null, null)">
    <div class="intro-icon">💫</div>
    <div>
      <div class="intro-label">✨ Watch intro first!</div>
      <div class="intro-sub">See how the app works</div>
    </div>
  </div>

  <div class="sport-card" onclick="showSport('riding')">
    <div class="sport-icon">🐴</div>
    <div>
      <div class="sport-label">Horse Riding</div>
      <div class="sport-sub">3 stretches · 30 sec total</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>

  <div class="sport-card" onclick="showSport('gymnastics')">
    <div class="sport-icon">🤸</div>
    <div>
      <div class="sport-label">Gymnastics</div>
      <div class="sport-sub">3 stretches + 2 skills</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>

  <div class="sport-card" onclick="showSport('soccer')">
    <div class="sport-icon">⚽</div>
    <div>
      <div class="sport-label">Soccer</div>
      <div class="sport-sub">3 stretches · 30 sec total</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>
</div>

<!-- SPORT -->
<div id="sport" class="screen">
  <button class="back-btn" onclick="goHome()">← back</button>
  <div class="screen-title" id="sport-title"></div>
  <div class="screen-sub">Tap a stretch to watch the video</div>
  <div id="stretch-list"></div>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
  <button class="back-btn" id="video-back-btn" onclick="goBack()">← back</button>
  <div class="video-container">
    <video id="video-player" controls playsinline webkit-playsinline autoplay></video>
  </div>
  <div class="video-title" id="video-title"></div>
  <div class="video-meta" id="video-meta"></div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="prevVideo()">← prev</button>
    <button class="nav-btn primary" id="next-btn" onclick="nextVideo()">next →</button>
  </div>
</div>

<script>
const data = {
  riding: {
    label: 'Horse Riding', icon: '🦄',
    numBg: '#fff5b3', numColor: '#8a6510',
    stretches: [
      { name: 'Tricep Stretch', dur: '10 sec', file: 'riding-1.mp4' },
      { name: 'Inner Thigh Stretch', dur: '10 sec', file: 'riding-2.mp4' },
      { name: 'Wide Leg Stretch', dur: '10 sec', file: 'riding-3.mp4' },
    ],
    skills: []
  },
  gymnastics: {
    label: 'Gymnastics', icon: '🤸',
    numBg: '#ede4ff', numColor: '#4a3580',
    stretches: [
      { name: 'Elevated Hamstring Stretch', dur: '10 sec', file: 'gymnastics-1.mp4' },
      { name: 'Butterfly', dur: '10 sec', file: 'gymnastics-2.mp4' },
      { name: 'Kneeling Leg Stretch', dur: '10 sec', file: 'gymnastics-3.mp4' },
    ],
    skills: [
      { name: 'Pull Over', dur: '10 sec', file: 'gymnastics-skill-1.mp4' },
      { name: 'Underswing', dur: '10 sec', file: 'gymnastics-skill-2.mp4' },
    ]
  },
  soccer: {
    label: 'Soccer', icon: '⚽',
    numBg: '#f0e8ff', numColor: '#6b4e9b',
    stretches: [
      { name: 'Hip Circles', dur: '10 sec', file: 'soccer-1.mp4' },
      { name: 'Backward Arm Circles', dur: '10 sec', file: 'soccer-2.mp4' },
      { name: 'Leg Stretch', dur: '10 sec', file: 'soccer-3.mp4' },
    ],
    skills: []
  }
};

const driveIds = {};
function driveUrl(f) { const id = driveIds[f]; return id ? 'https://drive.google.com/uc?export=download&id=' + id : f; }

let currentSport = null;
let currentList = [];
let currentIdx = 0;
let fromHome = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopVideo();
  show('home');
}

function goBack() {
  stopVideo();
  if (fromHome) { show('home'); } else { show('sport'); }
}

function stopVideo() {
  const v = document.getElementById('video-player');
  v.pause(); v.src = '';
}

function showSport(key) {
  currentSport = key;
  const s = data[key];
  document.getElementById('sport-title').textContent = s.icon + ' ' + s.label;
  const list = document.getElementById('stretch-list');
  list.innerHTML = '';

  const allItems = [...s.stretches, ...s.skills];

  if (s.stretches.length) {
    const d = document.createElement('div');
    d.className = 'section-divider';
    d.textContent = 'Stretches';
    list.appendChild(d);
    s.stretches.forEach((st, i) => list.appendChild(makeCard(st, i, s, allItems)));
  }

  if (s.skills.length) {
    const d = document.createElement('div');
    d.className = 'section-divider';
    d.textContent = 'Skills';
    list.appendChild(d);
    s.skills.forEach((sk, i) => {
      const card = makeCard(sk, s.stretches.length + i, s, allItems);
      list.appendChild(card);
    });
  }

  show('sport');
}

function makeCard(item, idx, s, allItems) {
  const card = document.createElement('div');
  card.className = 'stretch-card';
  card.innerHTML = `
    <div class="stretch-num" style="background:${s.numBg};color:${s.numColor}">${idx + 1}</div>
    <div>
      <div class="stretch-name">${item.name}</div>
      <div class="stretch-dur">${item.dur}</div>
    </div>
    <div class="play-arrow">▶</div>
  `;
  card.onclick = () => playVideo(item.file, item.name, s.label, allItems, idx);
  return card;
}

function playVideo(file, title, meta, list, idx) {
  fromHome = (list === null);
  currentList = list;
  currentIdx = idx;

  const player = document.getElementById('video-player');
  player.src = driveUrl(file);
  player.load();
  player.play().catch(() => {});

  document.getElementById('video-title').textContent = title;
  document.getElementById('video-meta').textContent = list
    ? meta + ' · ' + (idx + 1) + ' of ' + list.length
    : meta;

  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.style.display = (!list || idx === 0) ? 'none' : '';
  nextBtn.style.display = (!list || idx === list.length - 1) ? 'none' : '';

  show('video');
}

function prevVideo() {
  if (currentList && currentIdx > 0) {
    currentIdx--;
    const item = currentList[currentIdx];
    playVideo(item.file, item.name, data[currentSport].label, currentList, currentIdx);
  }
}

function nextVideo() {
  if (currentList && currentIdx < currentList.length - 1) {
    currentIdx++;
    const item = currentList[currentIdx];
    playVideo(item.file, item.name, data[currentSport].label, currentList, currentIdx);
  }
}
</script>
</body>
</html>
