<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Stretch &amp; Move">
  <meta name="theme-color" content="#ffffff">
  <title>Stretch &amp; Move!</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9f7f4;
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
    }
    .screen { display: none; padding: 16px 16px 32px; }
    .screen.active { display: block; }

    /* Home */
    .home-header { text-align: center; padding: 24px 0 20px; }
    .home-header .star { font-size: 52px; margin-bottom: 8px; }
    .home-header h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; }
    .home-header p { font-size: 15px; color: #777; margin-top: 4px; }

    .intro-card {
      background: #d4f5e2;
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform 0.12s, opacity 0.12s;
    }
    .intro-card:active { transform: scale(0.97); opacity: 0.85; }
    .intro-icon { font-size: 32px; }
    .intro-label { font-size: 17px; font-weight: 600; color: #1a6640; }
    .intro-sub { font-size: 13px; color: #2e8a58; margin-top: 2px; }

    .sport-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .sport-card:active { transform: scale(0.97); box-shadow: 0 0 0 rgba(0,0,0,0); }
    .sport-icon { font-size: 40px; }
    .sport-label { font-size: 19px; font-weight: 600; color: #1a1a1a; }
    .sport-sub { font-size: 13px; color: #999; margin-top: 3px; }
    .sport-arrow { margin-left: auto; font-size: 20px; color: #ccc; }

    /* Sport screen */
    .back-btn {
      background: none; border: none; cursor: pointer;
      font-size: 15px; color: #888; padding: 4px 0;
      margin-bottom: 16px; display: flex; align-items: center; gap: 6px;
    }
    .screen-title { font-size: 24px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .screen-sub { font-size: 14px; color: #999; margin-bottom: 18px; }

    .stretch-card {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 14px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      transition: transform 0.12s;
    }
    .stretch-card:active { transform: scale(0.97); }
    .stretch-num {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .stretch-name { font-size: 16px; font-weight: 600; color: #1a1a1a; }
    .stretch-dur { font-size: 12px; color: #aaa; margin-top: 2px; }
    .play-arrow { margin-left: auto; font-size: 22px; }

    .section-divider {
      font-size: 12px; font-weight: 600; color: #bbb;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin: 18px 0 10px;
    }

    /* Video screen */
    .video-container {
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      aspect-ratio: 9/16;
      width: 100%;
      margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .video-container video {
      width: 100%; height: 100%; object-fit: cover;
    }
    .video-title { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
    .video-meta { font-size: 13px; color: #aaa; margin-bottom: 18px; }
    .nav-row { display: flex; gap: 10px; }
    .nav-btn {
      flex: 1; padding: 14px;
      border-radius: 14px;
      border: none;
      background: #fff;
      font-size: 15px; font-weight: 600;
      cursor: pointer; color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.1s;
    }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn.primary { background: #1a1a1a; color: #fff; }
  </style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-header">
    <div class="star">🌟</div>
    <h1>Stretch &amp; Move!</h1>
    <p>Pick your sport and let's get stretching</p>
  </div>

  <div class="intro-card" onclick="playVideo('intro', 'Welcome!', 'Watch this first', null, null)">
    <div class="intro-icon">▶️</div>
    <div>
      <div class="intro-label">Watch intro first!</div>
      <div class="intro-sub">See how the app works</div>
    </div>
  </div>

  <div class="sport-card" onclick="showSport('riding')">
    <div class="sport-icon">🐴</div>
    <div>
      <div class="sport-label">Horse Riding</div>
      <div class="sport-sub">3 stretches · 30 sec total</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>

  <div class="sport-card" onclick="showSport('gymnastics')">
    <div class="sport-icon">🤸</div>
    <div>
      <div class="sport-label">Gymnastics</div>
      <div class="sport-sub">3 stretches + 2 skills</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>

  <div class="sport-card" onclick="showSport('soccer')">
    <div class="sport-icon">⚽</div>
    <div>
      <div class="sport-label">Soccer</div>
      <div class="sport-sub">3 stretches · 30 sec total</div>
    </div>
    <div class="sport-arrow">›</div>
  </div>
</div>

<!-- SPORT -->
<div id="sport" class="screen">
  <button class="back-btn" onclick="goHome()">← back</button>
  <div class="screen-title" id="sport-title"></div>
  <div class="screen-sub">Tap a stretch to watch the video</div>
  <div id="stretch-list"></div>
</div>

<!-- VIDEO -->
<div id="video" class="screen">
  <button class="back-btn" id="video-back-btn" onclick="goBack()">← back</button>
  <div class="video-container">
    <iframe id="video-player" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>
  </div>
  <div class="video-title" id="video-title"></div>
  <div class="video-meta" id="video-meta"></div>
  <div class="nav-row">
    <button class="nav-btn" id="prev-btn" onclick="prevVideo()">← prev</button>
    <button class="nav-btn primary" id="next-btn" onclick="nextVideo()">next →</button>
  </div>
</div>

<script>
const data = {
  riding: {
    label: 'Horse Riding', icon: '🐴',
    numBg: '#FFF3DC', numColor: '#8B5E00',
    stretches: [
      { name: 'Tricep Stretch', dur: '10 sec', file: 'videos/riding-1.mov' },
      { name: 'Inner Thigh Stretch', dur: '10 sec', file: 'videos/riding-2.mov' },
      { name: 'Wide Leg Stretch', dur: '10 sec', file: 'videos/riding-3.mov' },
    ],
    skills: []
  },
  gymnastics: {
    label: 'Gymnastics', icon: '🤸',
    numBg: '#EEE8FD', numColor: '#4B3B99',
    stretches: [
      { name: 'Elevated Hamstring Stretch', dur: '10 sec', file: 'videos/gymnastics-1.mov' },
      { name: 'Butterfly', dur: '10 sec', file: 'videos/gymnastics-2.mov' },
      { name: 'Kneeling Leg Stretch', dur: '10 sec', file: 'videos/gymnastics-3.mov' },
    ],
    skills: [
      { name: 'Pull Over', dur: '10 sec', file: 'videos/gymnastics-skill-1.mov' },
      { name: 'Underswing', dur: '10 sec', file: 'videos/gymnastics-skill-2.mov' },
    ]
  },
  soccer: {
    label: 'Soccer', icon: '⚽',
    numBg: '#E3F5DC', numColor: '#2D6E1A',
    stretches: [
      { name: 'Hip Circles', dur: '10 sec', file: 'videos/soccer-1.mov' },
      { name: 'Backward Arm Circles', dur: '10 sec', file: 'videos/soccer-2.mov' },
      { name: 'Leg Stretch', dur: '10 sec', file: 'videos/soccer-3.mov' },
    ],
    skills: []
  }
};

const driveIds = {
  'videos/intro.mov': '1lCiNpWF-jnCtNYHFnyanoamZbUOGMXEO',
};
function driveUrl(f) { const id = driveIds[f]; return id ? "https://drive.google.com/file/d/" + id + "/preview" : f; }

let currentSport = null;
let currentList = [];
let currentIdx = 0;
let fromHome = false;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopVideo();
  show('home');
}

function goBack() {
  stopVideo();
  if (fromHome) { show('home'); } else { show('sport'); }
}

function stopVideo() {
  const v = document.getElementById('video-player');
  v.src = "";
}

function showSport(key) {
  currentSport = key;
  const s = data[key];
  document.getElementById('sport-title').textContent = s.icon + ' ' + s.label;
  const list = document.getElementById('stretch-list');
  list.innerHTML = '';

  const allItems = [...s.stretches, ...s.skills];

  if (s.stretches.length) {
    const d = document.createElement('div');
    d.className = 'section-divider';
    d.textContent = 'Stretches';
    list.appendChild(d);
    s.stretches.forEach((st, i) => list.appendChild(makeCard(st, i, s, allItems)));
  }

  if (s.skills.length) {
    const d = document.createElement('div');
    d.className = 'section-divider';
    d.textContent = 'Skills';
    list.appendChild(d);
    s.skills.forEach((sk, i) => {
      const card = makeCard(sk, s.stretches.length + i, s, allItems);
      list.appendChild(card);
    });
  }

  show('sport');
}

function makeCard(item, idx, s, allItems) {
  const card = document.createElement('div');
  card.className = 'stretch-card';
  card.innerHTML = `
    <div class="stretch-num" style="background:${s.numBg};color:${s.numColor}">${idx + 1}</div>
    <div>
      <div class="stretch-name">${item.name}</div>
      <div class="stretch-dur">${item.dur}</div>
    </div>
    <div class="play-arrow">▶</div>
  `;
  card.onclick = () => playVideo(item.file, item.name, s.label, allItems, idx);
  return card;
}

function playVideo(file, title, meta, list, idx) {
  fromHome = (list === null);
  currentList = list;
  currentIdx = idx;

  const player = document.getElementById('video-player');
  player.src = driveUrl(file);



  document.getElementById('video-title').textContent = title;
  document.getElementById('video-meta').textContent = list
    ? meta + ' · ' + (idx + 1) + ' of ' + list.length
    : meta;

  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  prevBtn.style.display = (!list || idx === 0) ? 'none' : '';
  nextBtn.style.display = (!list || idx === list.length - 1) ? 'none' : '';

  show('video');
}

function prevVideo() {
  if (currentList && currentIdx > 0) {
    currentIdx--;
    const item = currentList[currentIdx];
    playVideo(item.file, item.name, data[currentSport].label, currentList, currentIdx);
  }
}

function nextVideo() {
  if (currentList && currentIdx < currentList.length - 1) {
    currentIdx++;
    const item = currentList[currentIdx];
    playVideo(item.file, item.name, data[currentSport].label, currentList, currentIdx);
  }
}
</script>
</body>
</html>
